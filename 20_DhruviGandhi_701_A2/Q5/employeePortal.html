<!DOCTYPE html>
<html lang="en">
<head>
    <base target="_self">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Portal</title>
    <meta name="description" content="Employee portal with profile and leave management">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-cookie@3.0.1/dist/js.cookie.min.js"></script>
    <style>
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen bg-gray-100">
    <!-- Navigation -->
    <nav class="bg-blue-600 text-white shadow-lg">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-xl font-bold">Employee Portal</h1>
            <div class="space-x-4">
                <button id="profileBtn" class="hover:bg-blue-700 px-3 py-1 rounded">Profile</button>
                <button id="leaveBtn" class="hover:bg-blue-700 px-3 py-1 rounded">Leave</button>
                <button id="logoutBtn" class="hover:bg-blue-700 px-3 py-1 rounded">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Login Section -->
    <section id="loginSection" class="container mx-auto px-4 py-8">
        <div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-6">
            <h2 class="text-2xl font-bold text-center mb-6">Employee Login</h2>
            <form id="loginForm">
                <div class="mb-4">
                    <label class="block text-gray-700 mb-2" for="email">Email</label>
                    <input type="email" id="email" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 mb-2" for="password">Password</label>
                    <input type="password" id="password" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">Login</button>
            </form>
        </div>
    </section>

    <!-- Profile Section -->
    <section id="profileSection" class="container mx-auto px-4 py-8 hidden">
        <div class="max-w-4xl mx-auto bg-white rounded-lg shadow-md p-6">
            <h2 class="text-2xl font-bold mb-6">Employee Profile</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <img src="https://picsum.photos/200?random=1" alt="Employee Photo" class="w-32 h-32 rounded-full mx-auto mb-4">
                    <h3 class="text-xl font-semibold text-center" id="employeeName"></h3>
                    <p class="text-gray-600 text-center" id="employeePosition"></p>
                </div>
                <div>
                    <div class="mb-4">
                        <h4 class="font-bold text-gray-700">Personal Information</h4>
                        <p><span class="font-semibold">Email:</span> <span id="employeeEmail"></span></p>
                        <p><span class="font-semibold">Department:</span> <span id="employeeDept"></span></p>
                    </div>
                    <div>
                        <h4 class="font-bold text-gray-700">Employment Details</h4>
                        <p><span class="font-semibold">Join Date:</span> <span id="employeeJoinDate"></span></p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Leave Section -->
    <section id="leaveSection" class="container mx-auto px-4 py-8 hidden">
        <div class="max-w-4xl mx-auto">
            <!-- Leave Application Form -->
            <div class="bg-white rounded-lg shadow-md p-6 mb-8">
                <h2 class="text-2xl font-bold mb-6">Apply for Leave</h2>
                <form id="leaveForm">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-gray-700 mb-2" for="startDate">Start Date</label>
                            <input type="date" id="startDate" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2" for="endDate">End Date</label>
                            <input type="date" id="endDate" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 mb-2" for="leaveReason">Reason</label>
                        <textarea id="leaveReason" rows="3" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required></textarea>
                    </div>
                    <button type="submit" class="bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500">Submit Application</button>
                </form>
            </div>

            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-2xl font-bold mb-6">Your Leave Applications</h2>
                <div class="overflow-x-auto">
                    <table class="min-w-full bg-white">
                <!-- Leave Applications List -->
                        <thead>
                            <tr class="bg-gray-100">
                                <th class="py-2 px-4 border">Start Date</th>
                                <th class="py-2 px-4 border">End Date</th>
                                <th class="py-2 px-4 border">Reason</th>
                                <th class="py-2 px-4 border">Status</th>
                            </tr>
                        </thead>
                        <tbody id="leaveList">
                            <!-- Leave applications will be populated here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <script>
        // API Configuration
        const API_BASE_URL = 'http://localhost:3000';
        
        // DOM Elements
        const loginSection = $('#loginSection');
        const profileSection = $('#profileSection');
        const leaveSection = $('#leaveSection');
        const loginForm = $('#loginForm');
        const leaveForm = $('#leaveForm');
        const leaveList = $('#leaveList');
        const profileBtn = $('#profileBtn');
        const leaveBtn = $('#leaveBtn');
        const logoutBtn = $('#logoutBtn');

        // Check authentication on page load
        $(document).ready(function() {
            const token = Cookies.get('token');
            if (token) {
                showAuthenticatedUI();
                fetchProfile();
                fetchLeaveApplications();
            } else {
                showLoginUI();
            }
        });

        // Login Form Submission
        loginForm.on('submit', function(e) {
            e.preventDefault();
            const email = $('#email').val();
            const password = $('#password').val();

            $.ajax({
                url: `${API_BASE_URL}/emp/login`,
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ email, password }),
                success: function(response) {
                    Cookies.set('token', response.token, { expires: 1 });
                    showAuthenticatedUI();
                    fetchProfile();
                    fetchLeaveApplications();
                },
                error: function(xhr) {
                    console.log(xhr.message);
                    
                    alert(xhr.responseJSON?.message || 'Login failed');
                }
            });
        });

        // Leave Form Submission
        leaveForm.on('submit', function(e) {
            e.preventDefault();
            const token = Cookies.get('token');
            const startDate = $('#startDate').val();
            const endDate = $('#endDate').val();
            const reason = $('#leaveReason').val();

            $.ajax({
                url: `${API_BASE_URL}/leave`,
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                contentType: 'application/json',
                data: JSON.stringify({ startDate, endDate, reason }),
                success: function() {
                    alert('Leave application submitted successfully');
                    leaveForm.trigger('reset');
                    fetchLeaveApplications();
                },
                error: function(xhr) {
                    alert(xhr.responseJSON?.message || 'Failed to submit leave application');
                }
            });
        });

        // Logout Button
        logoutBtn.on('click', function() {
            Cookies.remove('token');
            showLoginUI();
        });

         // Navigation Buttons
        profileBtn.on('click', function() {
            profileSection.removeClass('hidden');
            leaveSection.addClass('hidden');
        });

        leaveBtn.on('click', function() {
            leaveSection.removeClass('hidden');
            profileSection.addClass('hidden');
        });

        // Helper Functions
        function showAuthenticatedUI() {
            loginSection.addClass('hidden');
            profileSection.removeClass('hidden');
            leaveSection.addClass('hidden');
        }

        function showLoginUI() {
            loginSection.removeClass('hidden');
            profileSection.addClass('hidden');
            leaveSection.addClass('hidden');
        }

        function fetchProfile() {
            const token = Cookies.get('token');
            
            $.ajax({
                url: `${API_BASE_URL}/emp/getEmp`,
                method: 'GET',
                headers: { 'Authorization': `Bearer ${token}` },
                success: function(employee) {
                    
                    $('#employeeName').text(employee.name);
                    $('#employeePosition').text(employee.position);
                    $('#employeeEmail').text(employee.email);
                    $('#employeeDept').text(employee.department);
                    $('#employeeJoinDate').text(new Date(employee.joinDate).toLocaleDateString());
                },
                error: function(xhr) {                    
                    alert(xhr.responseJSON?.message || 'Failed to fetch profile');
                }
            });
        }

        function fetchLeaveApplications() {
            const token = Cookies.get('token');
            
            $.ajax({
                url: `${API_BASE_URL}/getLeaves`,
                method: 'GET',
                headers: { 'Authorization': `Bearer ${token}` },
                success: function(applications) {
                    leaveList.empty();
                    applications.forEach(app => {
                        const row = `
                            <tr>
                                <td class="py-2 px-4 border">${new Date(app.startDate).toLocaleDateString()}</td>
                                <td class="py-2 px-4 border">${new Date(app.endDate).toLocaleDateString()}</td>
                                <td class="py-2 px-4 border">${app.reason}</td>
                                <td class="py-2 px-4 border ${app.status === 'approved' ? 'text-green-600' : app.status === 'rejected' ? 'text-red-600' : 'text-yellow-600'}">
                                    ${app.status}
                                </td>
                            </tr>
                        `;
                        leaveList.append(row);
                    });
                },
                error: function(xhr) {
                    alert(xhr.responseJSON?.message || 'Failed to fetch leave applications');
                }
            });
        }
    </script>
</body>
</html>
